<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DEER - Doe. Empatize. Engaje. Realize.</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@900&family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="../assets/css/styles.css">
    <link rel="stylesheet" href="../assets/css/administracao.css"> 
    <link rel="shortcut icon" href="../assets/img/logo-deer-recortada-sem-fundo.png" type="image">
</head>
<body>
    
    <header class="header header-admin">
        <div class="header-container">
            <a href="../index.html" class="logo">
                <div class="logo-mask" title="DEER"></div>
            </a>
            <div class="usuario"></div> 

    <!--Botões para aumentar e diminuir o tamanho da fonte (ACESSIBILIDADE)-->
    <div class="acessibilidade">
    <button type="button" onclick="aumentarFonte()">A+</button>
    <button type="button" onclick="diminuirFonte()">A-</button>

        </div>
    </header>

    <main class="admin-main">
        
        <div class="admin-table-container">
            
            <table class="table text-center table-bordered table-hover admin-table">
                <thead class="table-light">
                    <tr>
                        <th class="align-middle">Nome Instituição</th>
                        <th class="align-middle">CNPJ</th>
                        <th>Status</th>
                        <th class="align-middle">Aceitar</th>
                        <th class="align-middle">Recusar</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        
                    </tr>   
                </tbody>
            </table>
        </div>
            
        <div class="modal-desenvolvimento-overlay" id="modal-detalhes-ong">
            <div class="modal-aviso" style="max-width: 550px; text-align: left;">
            <h3 id="modal-ong-nome" style="color: var(--red-base); margin-bottom: 15px;">Nome da ONG</h3>
        
        <div style="font-size: 0.9rem; color: var(--dark-text); line-height: 1.6;">
            <p><strong>CNPJ:</strong> <span id="modal-ong-cnpj"></span></p>
            <p><strong>Cidade/UF:</strong> <span id="modal-ong-local"></span></p>
            <p><strong>Chave Pix:</strong> <span id="modal-ong-pix"></span> (<span id="modal-ong-tipo-pix"></span>)</p>
            <p style="margin-top: 10px;"><strong>Descrição:</strong></p>
            <p id="modal-ong-desc" style="color: var(--gray-text);"></p>
        </div>

        <button type="button" class="btn-fechar-aviso" style="margin-top: 25px;" onclick="fecharModalDetalhes()">Fechar Resumo</button>
            </div>
        </div>

        <div class="modal-aviso-overlay" id="modal-confirmacao-acao">
            <div class="modal-aviso">
                <div class="icone-aviso" id="icone-confirmacao">!</div>
                <h3 id="titulo-confirmacao">Confirmação</h3>
                <p id="texto-confirmacao">Tem certeza que deseja realizar esta ação?</p>

        <div class="modal-botoes" style="display: flex; gap: 15px; margin-top: 25px;">
            <button class="btn-cancelar" type="button" onclick="fecharModalConfirmacao()" style="flex: 1; padding: 12px; border-radius: 10px; cursor: pointer; font-weight: 600;">Cancelar</button>
            <button id="btn-confirmar-acao" type="button" onclick="executarAcaoPendente()" style="flex: 1; padding: 12px; border-radius: 10px; border: none; color: white; cursor: pointer; font-weight: 600;">Confirmar</button>
        </div>
            </div>
        </div>

    </main>
    <script src="../assets/js/config.js"></script>
    <script src="../assets/js/administracao.js"></script>
</body>
</html>
