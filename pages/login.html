<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - DEER</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../assets/css/styles.css">
    <link rel="shortcut icon" href="../assets/img/logo-deer-recortada-sem-fundo.png" type="image/x-icon">
    <link rel="stylesheet" href="../assets/css/login.css">
</head>
<body>

    <!-- Cabecalho da pagina interna. O logo volta para a home e o menu pode ser preenchido pela sessao. -->
    <header class="header">
        <div class="header-container">
            <a href="../index.html" class="logo">
                <div class="logo-mask" title="DEER"></div>
            </a>
            <div class="usuario" id="user-menu"></div>
        </div>
    </header>

    <div class="login-page">
        <div class="login-card">

            <div class="login-logo"></div>
            <h1 class="login-titulo">Bem-vindo de volta</h1>
            <p class="login-subtitulo">Entre com seu e-mail ou CPF e senha.</p>

            <!-- O login.js escreve aqui mensagens como senha incorreta ou servidor indisponivel. -->
            <div class="toast-erro" id="toast-erro"></div>

            <form id="auth-form-login" novalidate>

                <!-- Campo unificado: o JavaScript detecta se o usuario digitou e-mail ou CPF. -->
                <div class="input-group">
                    <div class="input-label-row">
                        <label for="identificador">E-mail ou CPF</label>
                        <span class="tipo-badge" id="tipo-badge">—</span>
                    </div>
                    <input
                        type="text"
                        id="identificador"
                        placeholder="seu@email.com ou 000.000.000-00"
                        autocomplete="username"
                        inputmode="email"
                    >
                </div>

                <!-- O botao de mostrar/ocultar senha e criado pelo script.js. -->
                <div class="input-group">
                    <label for="senha">Senha</label>
                    <input type="password" id="senha" placeholder="Sua senha" autocomplete="current-password">
                </div>

                <button type="submit" class="btn-entrar" id="btn-entrar">Entrar</button>
            </form>

            <div class="divisor-social">
                <span>ou continue com</span>
            </div>
            <div class="btns-sociais">
                <button type="button" class="btn-social" title="Google (em breve)">
                    <img src="https://www.google.com/favicon.ico" width="18" height="18" alt="Google">
                </button>
                <button type="button" class="btn-social" title="Facebook (em breve)">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="#1877F2"><path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/></svg>
                </button>
                <button type="button" class="btn-social" title="Apple (em breve)">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="#000"><path d="M18.71 19.5c-.83 1.24-1.71 2.45-3.05 2.47-1.34.03-1.77-.79-3.29-.79-1.53 0-2 .77-3.27.82-1.31.05-2.3-1.32-3.14-2.53C4.25 17 2.94 12.45 4.7 9.39c.87-1.52 2.43-2.48 4.12-2.51 1.28-.02 2.5.87 3.29.87.78 0 2.26-1.07 3.8-.91.65.03 2.47.26 3.64 1.98-.09.06-2.17 1.28-2.15 3.81.03 3.02 2.65 4.03 2.68 4.04-.03.07-.42 1.44-1.38 2.83M13 3.5c.73-.83 1.94-1.46 2.94-1.5.13 1.17-.34 2.35-1.04 3.19-.69.85-1.83 1.51-2.95 1.42-.15-1.15.41-2.35 1.05-3.11z"/></svg>
                </button>
            </div>

            <p class="link-cadastro">Não tem conta? <a href="cadastro.html">Cadastre-se grátis</a></p>
            <a href="../index.html" class="link-voltar">← Voltar para o início</a>
        </div>
    </div>

    <!-- config.js vem primeiro para liberar as chamadas ao back-end usadas pelo login.js. -->
    <script src="../assets/js/config.js"></script>
    <script src="../assets/js/script.js"></script>
    <script src="../assets/js/login.js"></script>
</body>
</html>
